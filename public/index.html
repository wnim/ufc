<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UFC Finishes</title>
  <meta name="description" content="Spoiler-free UFC finish tracker. See who finished who — without learning the result." />
  <meta property="og:title" content="UFC Finishes 🤜😵" />
  <meta property="og:description" content="Spoiler-free UFC finish tracker. See who finished who — without learning the result." />
  <meta property="og:image" content="https://ufcfinishes.netlify.app/og-image.png" />
  <meta property="og:url" content="https://ufcfinishes.netlify.app" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://ufcfinishes.netlify.app/og-image.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥊</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-ufc">UFC</span><span class="logo-sub">FINISHES</span>
      </div>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
        <span class="icon-sun">☀︎</span>
        <span class="icon-moon">☾</span>
      </button>
    </div>
  </header>

  <div class="container">
    <h1 id="mainHeading">Recent Main-Card Fights</h1>

    <div class="controls">
      <label class="toggle-label">
        <input id="finishesOnly" type="checkbox" checked />
        <span>Finishes only</span>
      </label>
      <label class="toggle-label">
        <input id="hideNonNumbered" type="checkbox" />
        <span>Numbered events only</span>
      </label>
      <label class="toggle-label">
        <input id="hideWomen" type="checkbox" />
        <span>Hide women's fights</span>
      </label>
      <div class="control-group">
        <label for="monthsSelect">Timeframe</label>
        <select id="monthsSelect">
          <option value="3">3 months</option>
          <option value="6" selected>6 months</option>
          <option value="12">12 months</option>
          <option value="24">24 months</option>
        </select>
      </div>
      <button id="showAll" class="btn-primary">Show all fights</button>
    </div>

    <div id="events"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
